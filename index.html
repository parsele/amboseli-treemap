<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Amboseli Green Planet Ambassadors</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2f7a2f">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-dark bg-success mb-0 modern-nav">
    <div class="container-fluid">
      <div class="d-flex align-items-center gap-2">
        <button id="sidebarToggle" class="btn btn-outline-light btn-sm"><i class="bi bi-list"></i></button>
        <span class="navbar-brand mb-0 h1">
          <i class="bi bi-tree me-1"></i> Amboseli Green Planet Ambassadors
        </span>
      </div>
      <div class="d-flex align-items-center gap-2">
        <button id="installBtn" class="btn btn-outline-light btn-sm" style="display:none">
          <i class="bi bi-download"></i> Install App
        </button>
        <span class="badge bg-light text-success fs-6" id="totalCounter">0 trees</span>
      </div>
    </div>
  </nav>

  <div class="container-fluid p-0">
    <div class="row g-0">
      <div class="col-lg-8 map-col">
        <div id="map"></div>
      </div>
      <div class="col-lg-4" id="sidebar">
        <div class="p-3">
          <div class="d-flex align-items-center justify-content-between mb-2">
            <h5 class="m-0"><i class="bi bi-geo-alt text-success me-1"></i> Plantings</h5>
            <div class="form-check form-switch mb-0">
              <input class="form-check-input" type="checkbox" id="clusterToggle">
              <label class="form-check-label small text-muted" for="clusterToggle">Cluster</label>
            </div>
          </div>
          <div class="alert alert-light py-2 small mb-3">
            <i class="bi bi-info-circle text-success"></i>
            Adding plantings is available to administrators on the <a href="admin.html">Admin page</a>.
          </div>
          <hr class="my-2"/>
          <h6 class="text-success"><i class="bi bi-bar-chart me-1"></i>Stats</h6>
          <div id="statsArea">
            <div class="text-center text-muted py-4">
              <div class="spinner-border spinner-border-sm text-success" role="status"></div>
              <div class="small mt-2">Loading data...</div>
            </div>
          </div>
          <div class="mt-3 pt-2 border-top">
            <a class="btn btn-success btn-sm w-100" href="admin.html">
              <i class="bi bi-shield-lock me-1"></i> Admin Page
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
